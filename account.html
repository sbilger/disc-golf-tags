<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0066B3">
<title>Discinsanity — Account</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="assets/favicon.png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--blue:#0066B3;--blue-d:#00518f;--blue-l:#e8f1fa;--gold:#F4CE1A;--purple:#7a3fb0;--org:#e8742c;--ink:#16202b;--bg:#eaeef3;--card:#fff;--line:#dce3ea;--muted:#67737f;--bad:#d2453a;--good:#1f9d57;--shadow:0 6px 18px rgba(20,40,70,.08)}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:'Assistant',-apple-system,Segoe UI,Roboto,sans-serif;background:#c4ccd6;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:24px 12px;color:var(--ink)}
  .lead{max-width:380px;text-align:center;color:#3c4651;margin:0 0 18px;font-size:14px;line-height:1.45}
  .phone{width:380px;max-width:100%;min-height:780px;background:var(--bg);border-radius:36px;box-shadow:0 18px 50px rgba(0,0,0,.32);overflow:hidden;display:flex;flex-direction:column;border:10px solid #0b1118;position:relative}
  header{background:var(--blue);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;flex:0 0 auto}
  header img{height:30px;background:#fff;border-radius:7px;padding:2px}
  .hback{border:0;background:rgba(255,255,255,.16);color:#fff;border-radius:9px;padding:6px 10px;font-weight:800;font-size:12px;text-decoration:none}
  .htitle b{font-size:15px;font-weight:800}
  .body{flex:1;overflow-y:auto;padding:20px 18px 26px}
  .hero{display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:18px;animation:in .4s ease}
  @keyframes in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .av{width:84px;height:84px;border-radius:50%;background:linear-gradient(135deg,var(--blue),#003a66);color:#fff;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;box-shadow:0 8px 20px rgba(0,102,179,.3);margin-bottom:10px}
  .hero h1{margin:0;font-size:23px}
  .hero .em{color:var(--muted);font-weight:700;font-size:13px}
  .rolebadge{display:inline-block;margin-top:6px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:3px 10px;border-radius:20px;background:var(--blue-l);color:var(--blue)}
  .rolebadge.admin{background:#fdf3cf;color:#a3850a}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:var(--shadow);margin-bottom:14px;animation:in .4s ease}
  .card h3{margin:0 0 12px;font-size:15px}
  .seg{display:flex;gap:8px;margin-bottom:14px}
  .seg button{flex:1;border:1px solid var(--line);background:#fff;border-radius:10px;padding:10px;font-weight:800;font-size:14px;cursor:pointer;color:var(--muted);font-family:inherit}
  .seg button.on{background:var(--blue);color:#fff;border-color:var(--blue)}
  label{display:block;font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin:10px 0 4px}
  input,select{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:15px;font-weight:600;font-family:inherit}
  input:focus,select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-l)}
  .btn{width:100%;border:0;border-radius:14px;background:var(--blue);color:#fff;font-weight:800;font-size:16px;padding:14px;cursor:pointer;margin-top:14px;font-family:inherit;box-shadow:0 4px 12px rgba(0,102,179,.25)}
  .btn:active{transform:translateY(1px)}
  .btn.ghost{background:#fff;color:var(--blue);border:2px solid var(--blue);box-shadow:none;margin-top:10px}
  .btn.red{background:#fff;color:var(--bad);border:2px solid #f1c6c2;box-shadow:none}
  .err{color:var(--bad);font-size:13px;font-weight:700;margin-top:10px;min-height:18px;text-align:center}
  .kv{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
  .kv:last-child{border-bottom:0}.kv .k{color:var(--muted);font-weight:700}.kv .v{font-weight:800}
  .links{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .lk{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px;text-decoration:none;color:var(--ink);box-shadow:var(--shadow);display:flex;flex-direction:column;gap:3px}
  .lk .ic{font-size:22px}.lk .t{font-weight:800;font-size:14px}.lk .s{font-size:11px;color:var(--muted);font-weight:600}
  footer{flex:0 0 auto;background:#fff;border-top:1px solid var(--line);padding:14px 18px;display:flex;flex-wrap:wrap;gap:10px 16px;justify-content:center}
  footer a{color:var(--blue);font-weight:800;font-size:12px;text-decoration:none}
  .note{font-size:11px;color:#8a96a2;text-align:center;line-height:1.4;margin-top:8px}
  .hint{font-size:12px;color:var(--muted);text-align:center;margin-top:10px}
  @media (max-width:480px){body{padding:0;background:var(--bg)}.lead{display:none}.phone{width:100%;min-height:100vh;border:0;border-radius:0;box-shadow:none}}
</style>
</head>
<body>
<p class="lead"><b>Discinsanity Account</b> — demo login + member profile. Create an account or sign in
(try <b>jeff@discinsanity.com</b> / <b>discinsanity</b>). Real accounts arrive with the Supabase backend.</p>
<div class="phone">
  <header>
    <a class="hback" href="hub.html">‹ Hub</a>
    <img src="assets/discinsanity-logo.png" alt="">
    <div class="htitle"><b>Account</b></div>
  </header>
  <div class="body" id="body"></div>
  <footer>
    <a href="https://discinsanity.com" target="_blank" rel="noopener">🛒 Shop</a>
    <a href="https://instagram.com/discinsanitydgproshop" target="_blank" rel="noopener">📷 Instagram</a>
    <a href="https://facebook.com/Discinsanity" target="_blank" rel="noopener">👍 Facebook</a>
  </footer>
</div>
<script src="account.js"></script>
<script src="suite.js"></script>
<script>
const DIVS=['','MPO','MA1','MA2','MA3','MA4','FA1'];
let mode='in';
function render(){
  const me=DI.current();const el=document.getElementById('body');
  if(me){el.innerHTML=profileHTML(me);return;}
  el.innerHTML=`
    <div class="hero"><div class="av">🥏</div><h1>Welcome</h1><div class="em">Sign in to Discinsanity</div></div>
    <div class="card">
      <div class="seg"><button id="seg-in" class="${mode==='in'?'on':''}" onclick="setMode('in')">Sign in</button><button id="seg-up" class="${mode==='up'?'on':''}" onclick="setMode('up')">Create account</button></div>
      <div id="form"></div>
      <div class="err" id="err"></div>
    </div>
    <p class="note">Demo auth — accounts are stored on this device only until the cloud backend is live.</p>`;
  renderForm();
}
function setMode(m){mode=m;document.getElementById('seg-in').classList.toggle('on',m==='in');document.getElementById('seg-up').classList.toggle('on',m==='up');renderForm();document.getElementById('err').textContent='';}
function renderForm(){
  const f=document.getElementById('form');
  if(mode==='in'){
    f.innerHTML=`<label>Email</label><input id="email" type="email" autocomplete="email" placeholder="you@email.com">
      <label>Password</label><input id="pw" type="password" autocomplete="current-password" placeholder="••••">
      <button class="btn" onclick="doSignIn()">Sign in</button>
      <p class="hint">Demo: jeff@discinsanity.com / discinsanity</p>`;
  }else{
    f.innerHTML=`<label>Name</label><input id="name" placeholder="First Last">
      <label>Email</label><input id="email" type="email" autocomplete="email" placeholder="you@email.com">
      <label>Password</label><input id="pw" type="password" autocomplete="new-password" placeholder="4+ characters">
      <div style="display:flex;gap:8px"><div style="flex:1"><label>PDGA # (optional)</label><input id="pdga" inputmode="numeric" placeholder="12345"></div>
      <div style="flex:1"><label>Division</label><select id="division">${DIVS.map(d=>`<option value="${d}">${d||'—'}</option>`).join('')}</select></div></div>
      <label>Organizer code (optional)</label><input id="code" placeholder="leave blank unless Jeff gave you one">
      <button class="btn" onclick="doSignUp()">Create account</button>`;
  }
}
function err(m){document.getElementById('err').textContent=m;}
function doSignIn(){try{DI.signIn(val('email'),val('pw'));render();}catch(e){err(e.message);}}
function doSignUp(){try{DI.signUp({name:val('name'),email:val('email'),password:val('pw'),pdga:val('pdga'),division:val('division'),code:val('code')});render();}catch(e){err(e.message);}}
function val(id){const e=document.getElementById(id);return e?e.value:'';}


/* real league stats from the tags + doubles stores (same points rule as Leaderboards) */
function leagueStats(me){
  const norm=n=>(n||'').trim().toLowerCase();
  const names=[me.leagueName,me.name].filter(Boolean).map(norm);
  const match=n=>names.includes(norm(n));
  const read=k=>{try{return JSON.parse(localStorage.getItem(k))||null;}catch(e){return null;}};
  const tags=read('tagshuffle_v4_div'),dbl=read('discinsanity_doubles_v1');
  const out={tag:null,division:null,tagsPts:0,tagsNights:0,tagsWins:0,dblPts:0,dblNights:0,dblWins:0,found:false};
  const tp=(tags&&tags.players||[]).find(p=>match(p.name));
  if(tp){out.tag=tp.tag;out.division=tp.division;out.found=true;}
  (tags&&tags.rounds||[]).forEach(r=>{
    const byDiv={};(r.results||[]).forEach(x=>{(byDiv[x.division||'AM']=byDiv[x.division||'AM']||[]).push(x);});
    Object.keys(byDiv).forEach(d=>{
      const grp=[...byDiv[d]].sort((a,b)=>a.score-b.score);
      let place=0,prev=null;
      grp.forEach((e,i)=>{if(e.score!==prev){place=i+1;prev=e.score;}
        if(match(e.name)){out.found=true;out.tagsPts+=grp.length-place+1;out.tagsNights++;if(place===1)out.tagsWins++;}});
    });
  });
  (dbl&&dbl.rounds||[]).forEach(r=>(r.teams||[]).forEach(t=>(t.players||[]).forEach(nm=>{
    if(match(nm)){out.found=true;out.dblPts+=(t.points||0);out.dblNights++;if(t.place===1)out.dblWins++;}
  })));
  return out;
}
function statsCardHTML(me){
  const st=leagueStats(me);
  if(!st.found)return `<div class="card"><h3>My league stats</h3>
    <p style="margin:0;font-size:13px;color:var(--muted);line-height:1.5">No league results for
    <b>${esc(me.leagueName||me.name)}</b> on this device yet. Listed under a different name at league?
    Set <b>Name in league lists</b> in Edit profile and your tag + points appear here.</p></div>`;
  return `<div class="card"><h3>My league stats</h3>
    <div class="kv"><span class="k">Current tag</span><span class="v">${st.tag?'#'+st.tag+(st.division?' · '+esc(st.division):''):'—'}</span></div>
    <div class="kv"><span class="k">Tags</span><span class="v">${st.tagsPts} pts · ${st.tagsNights} nights · ${st.tagsWins} wins</span></div>
    <div class="kv"><span class="k">Doubles</span><span class="v">${st.dblPts} pts · ${st.dblNights} nights · ${st.dblWins} wins</span></div>
    <div class="kv"><span class="k">Season total</span><span class="v">${st.tagsPts+st.dblPts} pts</span></div>
    <a href="leaderboards.html" style="display:block;text-align:center;margin-top:10px;color:var(--blue);font-weight:800;font-size:13px;text-decoration:none">🏆 Full leaderboards ›</a></div>`;
}
function profileHTML(me){
  const isA=me.role==='admin'||me.role==='organizer';
  return `<div class="hero">
      <div class="av">${DI.initials(me.name)}</div><h1>${esc(me.name)}</h1><div class="em">${esc(me.email)}</div>
      <span class="rolebadge ${isA?'admin':''}">${isA?'⭐ '+me.role:'Member'}</span></div>
    <div class="card"><h3>Profile</h3>
      <div class="kv"><span class="k">PDGA #</span><span class="v">${me.pdga?`<a href="https://www.pdga.com/player/${me.pdga}" target="_blank" rel="noopener" style="color:var(--blue);text-decoration:none">${me.pdga} ↗</a>`:'—'}</span></div>
      <div class="kv"><span class="k">PDGA Rating</span><span class="v">${me.rating?me.rating:'—'}</span></div>
      <div class="kv"><span class="k">Division</span><span class="v">${me.division||'—'}</span></div>
      <div class="kv"><span class="k">Member since</span><span class="v">${me.created||'—'}</span></div>
      <button class="btn ghost" onclick="editProfile()">Edit profile</button></div>
    ${statsCardHTML(me)}
    <h3 style="margin:6px 2px 10px;font-size:14px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)">My stuff</h3>
    <div class="links">
      <a class="lk" href="index.html"><span class="ic">🥏</span><span class="t">My Tags</span><span class="s">Standings & history</span></a>
      <a class="lk" href="doubles.html"><span class="ic">👥</span><span class="t">My Doubles</span><span class="s">Season points</span></a>
      <a class="lk" href="events.html"><span class="ic">📅</span><span class="t">Events</span><span class="s">Upcoming</span></a>
      <a class="lk" href="hub.html"><span class="ic">🏠</span><span class="t">Hub</span><span class="s">Everything</span></a>
    </div>
    <button class="btn red" style="margin-top:16px" onclick="DI.signOut();DIS.dropOrg();mode='in';render()">Sign out</button>
    <p class="note">${isA?'Admin: you can post news & manage events from the Hub.<br>':''}PDGA # and rating are self-reported — Discinsanity has no live PDGA sync (PDGA blocks automated lookups). Tap PDGA # above to check your real profile.</p>`;
}
function editProfile(){const me=DI.current();const el=document.getElementById('body');
  el.innerHTML=`<div class="hero"><div class="av">${DI.initials(me.name)}</div><h1>Edit profile</h1></div>
    <div class="card">
      <label>Name</label><input id="e-name" value="${esc(me.name)}">
      <div style="display:flex;gap:8px"><div style="flex:1"><label>PDGA #</label><input id="e-pdga" inputmode="numeric" value="${esc(me.pdga||'')}"></div>
      <div style="flex:1"><label>PDGA Rating</label><input id="e-rating" inputmode="numeric" placeholder="e.g. 950" value="${esc(me.rating||'')}"></div></div>
      <label>Division</label><select id="e-div">${DIVS.map(d=>`<option value="${d}" ${d===me.division?'selected':''}>${d||'—'}</option>`).join('')}</select>
      <label>Name in league lists (if different)</label><input id="e-league" value="${esc(me.leagueName||'')}" placeholder="e.g. Mike R">
      ${me.role==='admin'?'':'<label>Organizer code (optional)</label><input id="e-code" placeholder="becomes admin if correct">'}
      <button class="btn" onclick="saveProfile()">Save</button>
      <button class="btn ghost" onclick="render()">Cancel</button>
      <p class="note">Enter your rating from your official PDGA profile — we can't pull it automatically
      (PDGA's site blocks that), so update it here whenever it changes.</p></div>`;
}
function saveProfile(){const patch={name:val('e-name'),pdga:val('e-pdga'),rating:val('e-rating').replace(/\D/g,''),division:val('e-div'),leagueName:val('e-league')};const c=document.getElementById('e-code');if(c)patch.code=c.value;DI.update(patch);render();}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
render();
</script>
</body>
</html>
